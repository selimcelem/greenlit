<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Greenlit — Checkout canceled</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1a1a1a;
      background: #f7f9fb;
    }
    main {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      box-sizing: border-box;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border: 1px solid #e4e8ec;
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: 0 4px 16px rgba(10, 25, 45, 0.06);
      text-align: center;
    }
    .logo { font-size: 36px; margin-bottom: 8px; }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 10px;
      color: #0a66c2;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
      color: #4a5560;
      margin: 8px 0;
    }
    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #8a949f;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="logo">🟢</div>
      <h1>Checkout canceled</h1>
      <p>No charge was made — your account hasn't changed.</p>
      <p>Close this tab and return to the Greenlit extension whenever you're ready.</p>
      <p class="hint">You can retry the upgrade from the quota panel on any LinkedIn job.</p>
    </div>
  </main>
</body>
</html>
