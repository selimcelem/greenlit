<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobLens Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }

    header {
      background: #0a66c2;
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header .logo {
      font-size: 20px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header p {
      font-size: 11px;
      opacity: 0.8;
    }

    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar.ready    { background: #f0faf4; color: #27ae60; }
    .status-bar.missing  { background: #fff3f3; color: #e74c3c; }
    .status-bar.saved    { background: #f0faf4; color: #27ae60; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .section:last-child { border-bottom: none; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    label span {
      font-weight: 400;
      color: #888;
      font-size: 11px;
      margin-left: 4px;
    }

    input[type="password"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0a66c2;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.5;
    }

    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 6px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafa;
    }

    .upload-area:hover {
      border-color: #0a66c2;
      background: #f0f7ff;
    }

    .upload-area.has-file {
      border-color: #27ae60;
      background: #f0faf4;
    }

    .upload-icon { font-size: 24px; margin-bottom: 4px; }
    .upload-text { font-size: 12px; color: #666; }
    .upload-text strong { color: #0a66c2; }
    .upload-text.success { color: #27ae60; font-weight: 600; }

    #pdf-input { display: none; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      color: #aaa;
      font-size: 11px;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .save-btn:hover { background: #084e96; }
    .save-btn:active { transform: scale(0.99); }

    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }

    a { color: #0a66c2; }
  </style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <div>
    <h1>JobLens</h1>
    <p>AI Job Match Filter for LinkedIn</p>
  </div>
</header>

<div class="status-bar missing" id="status-bar">
  <div class="dot"></div>
  <span id="status-text">Not configured — fill in your details below</span>
</div>

<!-- API Key -->
<div class="section">
  <label>Claude API Key <span>from console.anthropic.com</span></label>
  <input type="password" id="api-key" placeholder="sk-ant-…" />
  <p class="hint">Your key is stored locally on your machine only. Never sent anywhere except Anthropic.</p>
</div>

<!-- Resume -->
<div class="section">
  <label>Your Resume</label>

  <div class="upload-area" id="upload-area" onclick="document.getElementById('pdf-input').click()">
    <div class="upload-icon">📄</div>
    <div class="upload-text" id="upload-text">
      <strong>Click to upload PDF</strong><br>or paste text below
    </div>
  </div>
  <input type="file" id="pdf-input" accept=".pdf" />

  <div class="or-divider">or paste plain text</div>

  <textarea id="resume-text" placeholder="Paste your resume text here…"></textarea>
</div>

<!-- Preferences -->
<div class="section">
  <label>Job Preferences</label>

  <div style="margin-bottom:10px">
    <label style="font-weight:400; margin-bottom:4px">Target Role</label>
    <input type="text" id="target-role" placeholder="e.g. Junior Cloud Engineer" />
  </div>

  <div class="row-2">
    <div>
      <label style="font-weight:400; margin-bottom:4px">Seniority</label>
      <select id="seniority">
        <option value="Junior / Entry-level">Junior / Entry-level</option>
        <option value="Mid-level">Mid-level</option>
        <option value="Any">Any</option>
      </select>
    </div>
    <div>
      <label style="font-weight:400; margin-bottom:4px">Location</label>
      <input type="text" id="location" placeholder="e.g. Netherlands, Remote" />
    </div>
  </div>

  <div style="margin-top:10px">
    <label style="font-weight:400; margin-bottom:4px">Extra context <span>optional</span></label>
    <textarea id="notes" style="min-height:55px" placeholder="e.g. Career switcher from BIM engineering. AWS cert in progress."></textarea>
  </div>
</div>

<!-- Save -->
<div class="section">
  <button class="save-btn" id="save-btn">Save Settings</button>
</div>

<script src="popup.js"></script>
</body>
</html>
